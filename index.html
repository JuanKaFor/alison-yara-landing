<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Alison Yara · Consultorio Estético Coreano · Bogotá</title>
<meta name="description" content="Pioneros #1 en Bogotá en cosmiatría coreana. Hydrafacial, Lifting de Pestañas, Hydralips, Laminado de Cejas. Chicó Norte, Bogotá."/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/sections.jsx"></script>
<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#000000",
  "accentColor": "#99C5C1",
  "bgWarmth": 0,
  "displayFont": "Archivo",
  "italicFont": "Cormorant Garamond",
  "bodyFont": "Manrope",
  "spinBadge": true,
  "marquee": true,
  "fab": true
}/*EDITMODE-END*/;

const FONT_OPTIONS = {
  display: ["Archivo", "Manrope", "Cormorant Garamond", "Helvetica"],
  italic: ["Cormorant Garamond", "Archivo", "Manrope"],
  body: ["Manrope", "Archivo", "Helvetica"],
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty("--ay-ink", t.primaryColor);
    r.setProperty("--ay-accent", t.accentColor);
    const warmth = Number(t.bgWarmth) || 0;
    // Fondo blanco con leve calidez opcional
    r.setProperty("--ay-bg", `oklch(${99 - Math.abs(warmth) * 0.1}% 0.005 ${60 + warmth * 2})`);
    r.setProperty("--ay-bg-alt", `oklch(96% 0.012 ${60 + warmth * 2})`);
    r.setProperty("--ay-display", `"${t.displayFont}", "Helvetica Neue", sans-serif`);
    r.setProperty("--ay-italic", `"${t.italicFont}", Georgia, serif`);
    r.setProperty("--ay-body", `"${t.bodyFont}", "Helvetica Neue", sans-serif`);
  }, [t]);

  return (
    <>
      <Nav />
      <main>
        <Hero />
        <Categorias />
        <Testimonios />
        <Sobre />
        <Servicios />
        <Aparatologia />
        <Equipo />
        <Galeria />
        <Ubicacion />
        <FAQ />
        <CTAFinal />
      </main>
      <Footer />
      {t.fab && <FloatingWA />}
      {t.fab && <FloatingAgenda />}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Color">
          <TweakColor label="Tinta principal" value={t.primaryColor} onChange={v => setTweak('primaryColor', v)} />
          <TweakColor label="Acento" value={t.accentColor} onChange={v => setTweak('accentColor', v)} />
          <TweakSlider label="Calidez del fondo" min={-10} max={10} step={1} value={t.bgWarmth} onChange={v => setTweak('bgWarmth', v)} />
        </TweakSection>
        <TweakSection title="Tipografía">
          <TweakSelect label="Display" value={t.displayFont} onChange={v => setTweak('displayFont', v)} options={FONT_OPTIONS.display} />
          <TweakSelect label="Itálica" value={t.italicFont} onChange={v => setTweak('italicFont', v)} options={FONT_OPTIONS.italic} />
          <TweakSelect label="Cuerpo" value={t.bodyFont} onChange={v => setTweak('bodyFont', v)} options={FONT_OPTIONS.body} />
        </TweakSection>
        <TweakSection title="Detalles">
          <TweakToggle label="Insignia giratoria" value={t.spinBadge} onChange={v => setTweak('spinBadge', v)} />
          <TweakToggle label="Marquee de servicios" value={t.marquee} onChange={v => setTweak('marquee', v)} />
          <TweakToggle label="Botón flotante WhatsApp" value={t.fab} onChange={v => setTweak('fab', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// Apply spinBadge / marquee tweaks via class on body
const observerRoot = document.body;

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
